<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Storacha Email Validation</title>
  <meta name="description" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@acab/reset.css">
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&family=Fira+Code:wght@300..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --hot-red: #E91315;
      --hot-red-light: #EFE3F3;
      --hot-yellow: #FFC83F;
      --hot-yellow-light: #FFE4AE;
      --hot-blue: #0176CE;
      --hot-blue-light: #BDE0FF;
    }

    body {
      color: black;
      background-color: var(--hot-red-light);
      font-family: 'Epilogue', sans-serif;
      max-width: 70rem;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
    }

    h1 {
      color: var(--hot-red);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 1.5rem;
      line-height: 2rem;
    }

    h5 {
      color: var(--hot-red);
      font-size: 1rem;
      line-height: 1.5rem;
      margin-top: 1rem;
    }

    header {
      padding: 1rem 3rem 0;
    }

    main {
      padding: 0 3rem;
      text-align: center;
      width: 100%;
    }

    code {
      font-family: 'Fira Code';
      font-weight: 500;
    }

    pre > code {
      padding: 0.25rem 0;
      display: block;
      overflow-x: auto;
    }

    .box {
      border: 1px solid var(--hot-red);
      border-radius: 1rem;
      background-color: #FFFFFF;
      padding: 1.25rem;
      margin-top: 1rem;

      font-size: 0.875rem;
      line-height: 1.25rem;
    }
    .box > p {
      margin-bottom: 10px;
    }
    .box > p:last-child {
      margin-bottom: 0;
    }

    button {
      background-color: var(--hot-yellow-light);
      color: var(--hot-red);
      font-weight: 500;
      border: none;
      border-radius: 0.25rem;
      padding: 0.5rem 1rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
{{block "body" .}}{{end}}
</body>
</html>
